name: KIND 상장심사 자동 업데이트

on:
  schedule:
    # KST 오전 9시 (UTC 00:00), 오후 3시 (UTC 06:00)
    - cron: '0 0,6 * * 1-5'   # 평일만
  workflow_dispatch:            # 수동 실행 버튼

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: 레포 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install requests beautifulsoup4

      - name: 스크래핑 실행
        id: scrape
        run: |
          OUTPUT=$(python scraper.py 2>&1)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "CHANGED=true"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: 변경사항 커밋 & 푸시
        if: steps.scrape.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html data/listings.json
          git commit -m "chore: KIND 상장심사 현황 업데이트 $(date +'%Y-%m-%d %H:%M') KST"
          git push
